<!DOCTYPE html>
<html>
<head>
    <title>Virtual Try-On Result</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #6d28d9, #2563eb);
            text-align: center;
            padding-top: 80px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 420px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        img {
            width: 250px;
            margin: 20px 0;
            border-radius: 10px;
        }

        a {
            display: inline-block;
            padding: 10px 18px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>👕 Virtual Try-On Result</h2>

    <p><strong>1. Shirt removed</strong></p>
    <img src="{{ url_for('no_shirt_image') }}?t={{ ts }}" alt="User without shirt">

    <p><strong>2. With new shirt</strong></p>
    <img src="{{ url_for('final_image') }}?t={{ ts }}" alt="Final try-on">

    <br>
    <a href="/">← Try Again</a>
</div>

</body>
</html>
