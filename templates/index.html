<!DOCTYPE html>
<html>
<head>
    <title>Virtual Fitting Room</title>

    <style>
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #6d28d9);
            color: #f8fafc;
            text-align: center;
            padding: 40px;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        input, button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border-radius: 6px;
            border: none;
        }

        button {
            background: #f3e8ff;
            color: #6d28d9;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #16a34a;
            color: white;
        }
    </style>
</head>

<body>

    <h1>👚 Virtual Fitting Room</h1>

    <div class="card">

        <!-- ✅ FIXED: action="/process" added -->
        <form action="/process" method="POST" enctype="multipart/form-data">

            <label><b>Upload Person Image</b></label>
            <input type="file" name="user_image" accept="image/*" required>

            <label><b>Upload Dress Image</b></label>
            <input type="file" name="cloth_image" accept="image/*" required>

            <button type="submit">✨ Try On</button>
        </form>

    </div>

</body>
</html>
